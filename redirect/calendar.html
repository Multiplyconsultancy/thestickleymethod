<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Book Your Call — The Stickley Method</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --cyan:      #0EC4E6;
      --gold:      #c9a84c;
      --navy:      #0a2540;
      --dark:      #111111;
      --mid:       #444444;
      --muted:     #888888;
      --light:     #f5f5f5;
      --white:     #ffffff;
      --border:    #e0e0e0;
      --font-head: 'Barlow Condensed', sans-serif;
      --font-body: 'Barlow', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font-body);
      background: var(--white);
      color: var(--dark);
      line-height: 1.55;
      overflow-x: hidden;
    }
    a { text-decoration: none; color: inherit; }

    /* ── Header ─────────────────────────────────────────── */
    #header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    #logo-canvas { width: 46px; height: 46px; display: block; flex-shrink: 0; }
    .logo-brand { display: flex; flex-direction: column; line-height: 1; }
    .logo-brand-top {
      font-family: var(--font-head); font-size: 0.85rem; font-weight: 800;
      letter-spacing: 0.12em; color: var(--dark); text-transform: uppercase;
    }
    .logo-brand-bot {
      font-family: var(--font-head); font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.16em; color: var(--muted); text-transform: uppercase;
    }

    /* ── Heading ─────────────────────────────────────────── */
    #cal-heading {
      padding: 44px 24px 32px;
      text-align: center;
    }
    .cal-title {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: clamp(2rem, 8vw, 3.6rem);
      line-height: 1;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: var(--dark);
      margin-bottom: 20px;
    }
    .cal-divider {
      width: 48px;
      height: 3px;
      background: var(--gold);
      border-radius: 2px;
      margin: 0 auto;
    }

    /* ── Calendar embed ──────────────────────────────────── */
    #cal-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px 60px;
    }
  </style>
</head>
<body>

<header id="header">
  <a href="#" class="logo" aria-label="The Stickley Method">
    <canvas id="logo-canvas" width="200" height="200"></canvas>
    <span class="logo-brand">
      <span class="logo-brand-top">THE STICKLEY</span>
      <span class="logo-brand-bot">METHOD</span>
    </span>
  </a>
</header>

<section id="cal-heading">
  <h1 class="cal-title">Book your call below</h1>
  <div class="cal-divider"></div>
</section>

<div id="cal-wrap">
  <iframe src="https://api.leadconnectorhq.com/widget/booking/Emi9gmpXPbOn5xeunQXd" style="width: 100%;border:none;overflow: hidden;" scrolling="no" id="Emi9gmpXPbOn5xeunQXd_1774376336413"></iframe>
  <script src="https://link.msgsndr.com/js/form_embed.js" type="text/javascript"></script>
</div>

<script>
"use strict";
(function() {
  var FRAME_COUNT = 121;
  var FPS = 24;
  var FRAME_DELAY = Math.round(1000 / FPS);
  var REPEAT_AFTER = 17000;

  var logoCanvas = document.getElementById('logo-canvas');
  var logoCtx = logoCanvas ? logoCanvas.getContext('2d') : null;
  var frames = [];
  var loadedCount = 0;
  var timer = null;
  var playing = false;

  function padNum(n) { return ('000' + n).slice(-4); }

  function drawFrame(img) {
    if (!logoCtx || !img) return;
    logoCtx.clearRect(0, 0, logoCanvas.width, logoCanvas.height);
    var iw = img.naturalWidth, ih = img.naturalHeight;
    var cw = logoCanvas.width, ch = logoCanvas.height;
    var scale = Math.min(cw / iw, ch / ih);
    logoCtx.drawImage(img, (cw - iw*scale)/2, (ch - ih*scale)/2, iw*scale, ih*scale);
  }

  function play() {
    if (!logoCtx || playing) return;
    playing = true;
    var frame = 0;
    clearInterval(timer);
    timer = setInterval(function() {
      if (frames[frame]) drawFrame(frames[frame]);
      frame++;
      if (frame >= FRAME_COUNT) {
        clearInterval(timer);
        playing = false;
        setTimeout(function() { if (!playing) play(); }, REPEAT_AFTER);
      }
    }, FRAME_DELAY);
  }

  for (var i = 0; i < FRAME_COUNT; i++) {
    (function(idx) {
      var img = new Image();
      img.onload = function() {
        frames[idx] = img;
        loadedCount++;
        if (idx === 0) drawFrame(img);
        if (loadedCount === 15 && !playing) play();
      };
      img.src = '../frames/frame_' + padNum(idx + 1) + '.png';
    })(i);
  }
})();
</script>
</body>
</html>
